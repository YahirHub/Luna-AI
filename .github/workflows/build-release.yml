name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Calcular versión
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""' || true)
          if [ -z "$LATEST" ]; then
            NEW="v1.0.0"
          else
            BASE="${LATEST#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Release: ${NEW}"

  build-linux-amd64:
    needs: version
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Instalar y validar
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun test

      - name: Compilar y preparar paquete
        run: |
          bun run build
          mkdir -p release/luna-ai-linux-amd64
          cp dist/luna-ai release/luna-ai-linux-amd64/luna-ai
          cp -R dist/runtime release/luna-ai-linux-amd64/runtime
          cp README.md release/luna-ai-linux-amd64/README.md
          chmod +x release/luna-ai-linux-amd64/luna-ai
          find release/luna-ai-linux-amd64/runtime/whisper -type f -name whisper-cli -exec chmod +x {} +
          find release/luna-ai-linux-amd64/runtime/ffmpeg -type f -name ffmpeg -exec chmod +x {} +
          find release/luna-ai-linux-amd64/runtime/agent-browser -type f -name agent-browser -exec chmod +x {} +
          test -f release/luna-ai-linux-amd64/runtime/whisper/system-libs/libgomp.so.1
          test -f release/luna-ai-linux-amd64/runtime/ffmpeg/ffmpeg
          test -f release/luna-ai-linux-amd64/runtime/ffmpeg/manifest.json
          test -f release/luna-ai-linux-amd64/runtime/agent-browser/agent-browser
          tar -czf release/luna-ai-linux-amd64.tar.gz -C release luna-ai-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: luna-ai-linux-amd64
          path: release/luna-ai-linux-amd64.tar.gz
          if-no-files-found: error

  build-linux-arm64:
    needs: version
    runs-on: ubuntu-24.04-arm
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Instalar y validar
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun test

      - name: Compilar y preparar paquete
        run: |
          bun run build
          mkdir -p release/luna-ai-linux-arm64
          cp dist/luna-ai release/luna-ai-linux-arm64/luna-ai
          cp -R dist/runtime release/luna-ai-linux-arm64/runtime
          cp README.md release/luna-ai-linux-arm64/README.md
          chmod +x release/luna-ai-linux-arm64/luna-ai
          find release/luna-ai-linux-arm64/runtime/whisper -type f -name whisper-cli -exec chmod +x {} +
          find release/luna-ai-linux-arm64/runtime/ffmpeg -type f -name ffmpeg -exec chmod +x {} +
          find release/luna-ai-linux-arm64/runtime/agent-browser -type f -name agent-browser -exec chmod +x {} +
          test -f release/luna-ai-linux-arm64/runtime/whisper/system-libs/libgomp.so.1
          test -f release/luna-ai-linux-arm64/runtime/ffmpeg/ffmpeg
          test -f release/luna-ai-linux-arm64/runtime/ffmpeg/manifest.json
          test -f release/luna-ai-linux-arm64/runtime/agent-browser/agent-browser
          tar -czf release/luna-ai-linux-arm64.tar.gz -C release luna-ai-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: luna-ai-linux-arm64
          path: release/luna-ai-linux-arm64.tar.gz
          if-no-files-found: error

  build-windows-amd64:
    needs: version
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Instalar y validar
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun test

      - name: Compilar y preparar paquete
        shell: pwsh
        run: |
          bun run build
          New-Item -ItemType Directory -Force -Path release/luna-ai-windows-amd64 | Out-Null
          Copy-Item dist/luna-ai.exe release/luna-ai-windows-amd64/luna-ai.exe
          Copy-Item dist/runtime release/luna-ai-windows-amd64/runtime -Recurse
          Copy-Item README.md release/luna-ai-windows-amd64/README.md
          if (-not (Test-Path release/luna-ai-windows-amd64/runtime/ffmpeg/ffmpeg.exe)) { throw "Falta FFmpeg en el runtime Windows" }
          if (-not (Test-Path release/luna-ai-windows-amd64/runtime/ffmpeg/manifest.json)) { throw "Falta manifest de FFmpeg" }
          if (-not (Test-Path release/luna-ai-windows-amd64/runtime/agent-browser/agent-browser.exe)) { throw "Falta agent-browser en el runtime Windows" }
          Compress-Archive -Path release/luna-ai-windows-amd64 -DestinationPath release/luna-ai-windows-amd64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: luna-ai-windows-amd64
          path: release/luna-ai-windows-amd64.zip
          if-no-files-found: error

  release:
    needs: [version, build-linux-amd64, build-linux-arm64, build-windows-amd64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: luna-ai-*
          path: ./artifacts
          merge-multiple: true

      - name: Crear release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -lh ./artifacts
          gh release create "${{ needs.version.outputs.version }}" \
            ./artifacts/* \
            --title "${{ needs.version.outputs.version }}" \
            --generate-notes
